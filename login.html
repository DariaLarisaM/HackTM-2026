<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Glow - Autentificare</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px);
            padding: 20px;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            padding: 45px 35px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

            .input-group label {
                display: block;
                margin-bottom: 8px;
                font-size: 14px;
                color: rgba(255, 255, 255, 0.8);
                margin-left: 5px;
                font-weight: 500;
            }

            .input-group input {
                width: 100%;
                padding: 15px 20px;
                background-color: rgba(0, 0, 0, 0.3);
                border: 1px solid rgba(255, 255, 255, 0.15);
                color: white;
                border-radius: 16px;
                font-size: 15px;
                outline: none;
                transition: 0.3s;
            }

                .input-group input:focus {
                    border-color: rgba(255, 255, 255, 0.5);
                    background-color: rgba(0, 0, 0, 0.4);
                }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

            .btn-submit:hover {
                background-color: white;
                color: var(--bg2);
            }

        .error-box {
            color: #ff6b6b;
            background-color: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="brand">
            <div class="brand-icon">CG</div>
            <div class="brand-text"><h2>CityGlow</h2><span>Portal Centralizat</span></div>
        </div>
        <nav class="nav-links">
            <a href="prezentare.html" class="nav-item">Înapoi la Prezentare</a>
        </nav>
    </header>

    <main class="login-container">
        <div class="glass-card login-box">
            <div class="logo-area">
                <div class="brand-icon" style="width: 55px; height: 55px; font-size: 20px;">CG</div>
                <div style="text-align: left;">
                    <h1 style="font-size: 24px; font-weight: 700;">City Glow</h1>
                    <p style="font-size: 11px; text-transform: uppercase; color: rgba(255,255,255,0.6);">Autentificare securizată</p>
                </div>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Nume utilizator</label>
                    <input type="text" id="username" placeholder="ex: cetatean sau politie" required autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="password">Parolă</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit">Intră în cont</button>
            </form>

            <div id="errorMessage" class="error-box">
                Date de autentificare incorecte! (cetatean / 1234 sau politie / admin)
            </div>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (event) {
            event.preventDefault();
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';

            if (user === 'cetatean' && pass === '1234') {
                window.location.href = 'index.html';
            } else if (user === 'politie' && pass === 'admin') {
                window.location.href = 'indexInstitutie.html';
            } else {
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
