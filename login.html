<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Glow - Autentificare</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Fundalul mov închis din marginea site-ului vostru */
            background-color: #261132;
            background-image: radial-gradient(circle at top right, #3d1b54, #261132);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            /* Containerul "Glassmorphism" similar cu cardurile din dreapta (Alerte/Rută) */
            background-color: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        /* Recreerea logo-ului din stânga sus */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .logo-circle {
            background-color: rgba(255, 255, 255, 0.2);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .logo-text {
            text-align: left;
        }

        .logo-text h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .logo-text p {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            margin-left: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 16px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s, background-color 0.3s;
        }

        .input-group input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background-color: rgba(0, 0, 0, 0.3);
        }

        /* Butonul de login exact ca butonul vostru "Primește notificare" */
        button {
            width: 100%;
            padding: 16px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px; /* Colțuri rotunjite masiv (pill shape) */
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover {
            background-color: white;
            color: #5d2570; /* Movul tematic la hover */
        }

        .error-message {
            color: #ff6b6b;
            background-color: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        
        <div class="logo-container">
            <div class="logo-circle">CG</div>
            <div class="logo-text">
                <h1>City Glow</h1>
                <p>Portal Autentificare</p>
            </div>
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Nume utilizator</label>
                <input type="text" id="username" placeholder="ex: cetatean sau politie" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label for="password">Parolă</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit">Intră în cont</button>
        </form>

        <div id="errorMessage" class="error-message">
            Date de autentificare incorecte!
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMessage');

            errorDiv.style.display = 'none';

            // Logica rămâne aceeași!
            if (user === 'cetatean' && pass === '1234') {
                window.location.href = 'index.html';
            } else if (user === 'politie' && pass === 'admin') {
                window.location.href = 'indexInstitutie.html';
            } else {
                errorDiv.style.display = 'block';
            }
        });
    </script>

</body>
</html>
