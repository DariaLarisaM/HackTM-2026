<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Glow | Command Center B2G</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --glow-green: #00ff88;
            --glow-red: #ff4d4d;
            --glow-blue: #00d9ff;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar pentru statistici */
        .sidebar {
            width: 350px;
            background: var(--card-bg);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            z-index: 100;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Harta Map */
        #map {
            flex: 1;
            width: 100%;
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        /* Widget-uri Stats */
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--glow-blue);
        }

        .stat-card.emergency { border-left-color: var(--glow-red); }
        .stat-card.eco { border-left-color: var(--glow-green); }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
        }

        /* Emergency Console */
        .emergency-controls {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .btn-override {
            width: 100%;
            padding: 12px;
            background: var(--glow-red);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-override:hover {
            box-shadow: 0 0 15px var(--glow-red);
        }

        /* Alert Overlay */
        #alert-notification {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--glow-red);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            z-index: 1000;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2 class="brand">City<span>Glow</span> Admin</h2>
        
        <div class="stat-card eco">
            <span class="stat-label">Total CO2 Salvat</span>
            <span class="stat-value" id="co2-val">0.000 kg</span>
        </div>

        <div class="stat-card">
            <span class="stat-label">Flux Trafic Activ</span>
            <span class="stat-value" id="traffic-flow">Scăzut</span>
        </div>

        <div class="stat-card emergency" id="near-miss-card">
            <span class="stat-label">Near-Miss Detectate</span>
            <span class="stat-value" id="near-miss-count">0</span>
        </div>

        <div class="emergency-controls">
            <h3>Manual Override</h3>
            <button class="btn-override" onclick="sendEmergency()">Undă Verde Ambulanță</button>
            <p style="font-size: 10px; color: #666; margin-top: 10px;">
                *Activarea manuală forțează semafoarele în modul siguranță timp de 30s.
            </p>
        </div>
    </aside>

    <main class="main-content">
        <div id="alert-notification">⚠️ ALERTĂ: NEAR-MISS DETECTAT!</div>
        <div id="map"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initializare Harta
        const map = L.map('map').setView([44.4268, 26.1025], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Conexiune WebSocket la Bridge-ul Python
        const socket = new WebSocket('ws://localhost:8000/ws/city-data');
        let nearMissCount = 0;

        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            if (data.type === 'TRAFFIC_STATS') {
                document.getElementById('co2-val').innerText = data.payload.co2 + " kg";
                document.getElementById('traffic-flow').innerText = 
                    (data.payload.b1 + data.payload.b2 > 5) ? "Intens" : "Normal";
            }

            if (data.type === 'NEAR_MISS') {
                nearMissCount++;
                document.getElementById('near-miss-count').innerText = nearMissCount;
                showAlert();
                
                // Punem un cerc rosu pe harta unde a fost incidentul
                L.circle([44.4268, 26.1025], {
                    color: 'red',
                    fillColor: '#f03',
                    fillOpacity: 0.5,
                    radius: 20
                }).addTo(map).bindPopup("Near-Miss detectat aici!").openPopup();
            }
        };

        function showAlert() {
            const el = document.getElementById('alert-notification');
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        async function sendEmergency() {
            // Trimitem comanda inapoi la Bridge pentru Arduino
            await fetch('http://localhost:8000/control/emergency', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ direction: 'main_street', state: 'B' })
            });
            alert("Sistemul a fost setat pe UNDA VERDE.");
        }
    </script>
</body>
</html>
